<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@corvu-next dev</title>
    <style>
      body { font-family: system-ui, sans-serif; padding: 2rem; margin: 0; }
      button { padding: 0.5rem 1rem; cursor: pointer; }
      .dialog-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.5);
        display: flex; align-items: center; justify-content: center;
      }
      .dialog-content {
        background: white; padding: 2rem; border-radius: 8px;
        min-width: 300px; animation: slide-in 200ms ease-out;
      }
      .dialog-content[data-state="hiding"] {
        animation: slide-out 200ms ease-in;
      }
      @keyframes slide-in {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes slide-out {
        from { opacity: 1; transform: translateY(0); }
        to { opacity: 0; transform: translateY(-10px); }
      }
      .list-item {
        padding: 0.5rem; border: 1px solid #ccc; margin-bottom: 4px;
      }
      .list-item[aria-selected="true"] { background: #007acc; color: white; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
